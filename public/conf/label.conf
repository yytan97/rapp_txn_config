		"t_institution_saf_interleave_policy": "When performing SAF replay the following rules are applied: <ul class='mb-0'><li>An internal table is maintained to catch multiple records for the same PAN. When the SAF module attempts to send a transaction, it first checks if there  are multiple records for the same PAN and if so, will send those records sequentially. That is, the first record will be sent and a response received. Then the next record and so forth.</li><li>Each time a timeout ocurrs, the total consecutive timeout counter is incremented. If this counter exceeds the configured value, then saf replay is terminated.</li><li>Each time a timeout ocurrs, the transaction’s retry count is incremented (along with the consecutive timeout counter). If the counter exceeds the configured value, the transaction is abandoned.</li><li>Each time a successful response is received (i.e. the response was not timed out), the total consecutive timeout counter is reset to zero (0)</li></ul>",

